<app-cursor />
<svg class="fixed inset-0 w-full h-full pointer-events-none z-[9997] opacity-[0.032]" aria-hidden="true">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>
<div
  class="fixed top-0 left-0 z-50 h-[3px] bg-[#C9FF47] pointer-events-none transition-[width] duration-75"
  [style.width]="scrollProgress() + '%'"
  role="progressbar"
  aria-label="Page scroll progress"
  [attr.aria-valuenow]="scrollProgress()"
  aria-valuemin="0"
  aria-valuemax="100"
></div>
<app-navbar />
<main id="main-content">
  <app-hero />
  <app-about />
  <app-services />
  <app-experience />
  <app-projects />
  <app-footer />
</main>
