<section id="projects" aria-labelledby="projects-heading" class="bg-white border-b-[3px] border-black py-20 md:py-28">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex items-center gap-3 mb-12">
      <span class="font-black text-sm uppercase tracking-widest bg-[#FF6B7A] text-white px-3 py-1" aria-hidden="true">04</span>
      <h2 id="projects-heading" class="font-black text-3xl md:text-4xl">Featured Projects</h2>
    </div>

    <div class="flex flex-col gap-8">
      @for (project of projects; track project.title) {
        <article
          class="border-[3px] border-black shadow-[8px_8px_0_#000] hover:shadow-[4px_4px_0_#000] hover:translate-x-1 hover:translate-y-1 transition-all duration-150 overflow-hidden"
          [attr.aria-label]="project.title"
        >
          <div class="h-[5px] w-full" [style.background-color]="project.accent" aria-hidden="true"></div>

          <div class="p-8">
            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4 mb-5">
              <div>
                <h3 class="font-black text-3xl text-[#0b0b0b] mb-1">{{ project.title }}</h3>
                <p class="font-semibold text-sm uppercase tracking-widest" [style.color]="project.accent">
                  {{ project.period }}
                </p>
              </div>

              <div class="flex gap-3 flex-shrink-0">
                @if (project.link) {
                  <a
                    [href]="project.link"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="font-bold text-sm px-4 py-2 bg-black text-white border-[3px] border-black shadow-[4px_4px_0_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150"
                    [attr.aria-label]="'Visit ' + project.title + ' website'"
                  >
                    Visit site →
                  </a>
                }
                @if (project.repo) {
                  <a
                    [href]="project.repo"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="font-bold text-sm px-4 py-2 bg-white text-black border-[3px] border-black shadow-[4px_4px_0_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150"
                    [attr.aria-label]="'View ' + project.title + ' on GitHub'"
                  >
                    GitHub →
                  </a>
                }
              </div>
            </div>

            <p class="text-[#393939] text-base leading-relaxed mb-6">{{ project.description }}</p>

            <div class="flex flex-wrap gap-2" role="list" aria-label="Technologies used">
              @for (tag of project.tags; track tag) {
                <span role="listitem" class="font-bold text-xs border-[3px] border-black px-3 py-1 shadow-[3px_3px_0_#000]">
                  {{ tag }}
                </span>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
