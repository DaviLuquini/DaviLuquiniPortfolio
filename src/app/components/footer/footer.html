<footer id="contact" aria-label="Contact and footer" class="bg-white py-20">
  <div class="max-w-6xl mx-auto px-6">

    <h2 class="font-black text-4xl md:text-6xl leading-tight mb-6">
      Got a project?<br>
      <span class="bg-[#FACC15] px-2">Let's build it.</span>

    <p class="text-[#393939] text-lg max-w-xl mb-10 leading-relaxed">
      I'm open to new opportunities, freelance projects, and collaborations. Drop me a message!

    <div class="flex flex-col sm:flex-row flex-wrap gap-4 mb-16">
      <a href="mailto:daviluquini7@gmail.com"

        daviluquini7&#64;gmail.com →
      </a>

      </button>
      <a href="https://github.com/DaviLuquini" target="_blank" rel="noopener noreferrer"

        class="font-bold text-base px-7 py-3.5 bg-white text-black border-[3px] border-black shadow-[5px_5px_0_#000] hover:shadow-none hover:translate-x-[5px] hover:translate-y-[5px] transition-all duration-150">
        GitHub →
      </a>
      <a href="https://linkedin.com/in/daviluquini" target="_blank" rel="noopener noreferrer"
        aria-label="Davi Luquini on LinkedIn"
        class="font-bold text-base px-7 py-3.5 bg-[#0A66C2] text-white border-[3px] border-black shadow-[5px_5px_0_#000] hover:shadow-none hover:translate-x-[5px] hover:translate-y-[5px] transition-all duration-150">
        LinkedIn →

    <div class="border-t-[3px] border-black pt-8 flex flex-col md:flex-row items-center justify-between gap-4">
