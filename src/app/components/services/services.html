<section id="services" aria-labelledby="services-heading" class="bg-white border-b-[3px] border-black py-20 md:py-28">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex items-center gap-3 mb-12">
      <span class="font-black text-sm uppercase tracking-widest bg-[#FF4A60] text-white px-3 py-1" aria-hidden="true">02</span>
      <h2 id="services-heading" class="font-black text-3xl md:text-4xl">
        My <span class="bg-[#FF4A60] text-white px-2">Services</span>
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (service of services; track service.number) {
        @if (service.isCta) {
          <div class="border-[3px] border-black p-8 bg-[#FFC224] shadow-[6px_6px_0_#000] flex flex-col justify-between min-h-[240px]">
            <div class="font-black text-5xl leading-none mb-6" aria-hidden="true">→</div>
            <div>
              <h3 class="font-black text-2xl text-black mb-3">{{ service.title }}</h3>
              <p class="text-black font-medium text-base mb-6 leading-relaxed">{{ service.description }}</p>
              <a
                href="mailto:daviluquini7@gmail.com"
                class="inline-block font-black text-sm px-5 py-2.5 bg-black text-white border-[3px] border-black shadow-[4px_4px_0_rgba(0,0,0,0.25)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150"
              >
                Contact me →
              </a>
            </div>
          </div>
        } @else {
          <article
            class="border-[3px] border-black p-8 bg-white shadow-[6px_6px_0_#000] hover:shadow-[3px_3px_0_#000] hover:translate-x-[3px] hover:translate-y-[3px] transition-all duration-150"
            [attr.aria-label]="service.title"
          >
            <div class="font-black text-4xl leading-none mb-4" [style.color]="service.accent" aria-hidden="true">
              {{ service.number }}
            </div>
            <h3 class="font-black text-xl text-[#0b0b0b] mb-3">{{ service.title }}</h3>
            <p class="text-[#393939] leading-relaxed mb-6">{{ service.description }}</p>
            <div class="flex flex-wrap gap-2" role="list" aria-label="Technologies">
              @for (tag of service.tags; track tag) {
                <span
                  role="listitem"
                  class="font-semibold text-xs border-2 border-black px-2.5 py-1"
                  [style.color]="service.accent"
                  [style.background-color]="service.accent + '18'"
                >{{ tag }}</span>
              }
            </div>
          </article>
        }
      }
    </div>
  </div>
</section>
