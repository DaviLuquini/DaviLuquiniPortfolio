<header role="banner">
  <nav aria-label="Main navigation" class="sticky top-0 z-50 bg-white border-b-[3px] border-black">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#" aria-label="Davi Luquini – Home" class="font-black text-2xl tracking-tighter text-black">DL.</a>

      <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0" role="list">
        <li><a href="#about" class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">{{ t().nav.about }}</a></li>
        <li><a href="#services" class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">{{ t().nav.services }}</a></li>
        <li><a href="#experience" class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">{{ t().nav.experience }}</a></li>
        <li><a href="#projects" class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">{{ t().nav.projects }}</a></li>
      </ul>

      <div class="hidden md:flex items-center gap-3">
        <button
          (click)="toggleLang()"
          class="font-black text-xs tracking-widest border-[2px] border-black px-2.5 py-1 hover:bg-black hover:text-white transition-colors duration-150"
          [attr.aria-label]="lang() === 'en' ? 'Switch to Portuguese' : 'Switch to English'"
        >{{ lang() === 'en' ? 'PT' : 'EN' }}</button>
        <a href="mailto:daviluquini7@gmail.com"
          class="font-bold text-sm px-5 py-2.5 bg-black text-white border-[3px] border-black shadow-[4px_4px_0_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150">
          {{ t().nav.talk }}
        </a>
      </div>

      <button
        class="md:hidden p-2 border-[3px] border-black shadow-[3px_3px_0_#000] hover:shadow-none hover:translate-x-[3px] hover:translate-y-[3px] transition-all duration-150"
        [attr.aria-expanded]="menuOpen()" aria-controls="mobile-menu" aria-label="Toggle navigation menu"
        (click)="toggleMenu()">
        <span class="block w-5 h-0.5 bg-black mb-1" aria-hidden="true"></span>
        <span class="block w-5 h-0.5 bg-black mb-1" aria-hidden="true"></span>
        <span class="block w-5 h-0.5 bg-black" aria-hidden="true"></span>
      </button>
    </div>

    @if (menuOpen()) {
    <div id="mobile-menu" class="md:hidden border-t-[3px] border-black bg-white px-6 py-4 flex flex-col gap-4">
      <a href="#about" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">{{ t().nav.about }}</a>
      <a href="#services" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">{{ t().nav.services }}</a>
      <a href="#experience" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">{{ t().nav.experience }}</a>
      <a href="#projects" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">{{ t().nav.projects }}</a>
      <div class="flex gap-3 items-center">
        <button (click)="toggleLang()" class="font-black text-xs tracking-widest border-[2px] border-black px-2.5 py-1">{{ lang() === 'en' ? 'PT' : 'EN' }}</button>
        <a href="mailto:daviluquini7@gmail.com"
          class="font-bold text-sm px-5 py-2.5 bg-black text-white border-[3px] border-black text-center flex-1">{{ t().nav.talk }}</a>
      </div>
    </div>
    }
  </nav>
</header>
