<header role="banner">
  <nav aria-label="Main navigation" class="sticky top-0 z-50 bg-white border-b-[3px] border-black">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#" aria-label="Davi Luquini – Home" class="font-black text-2xl tracking-tighter text-black">DL.</a>

      <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0" role="list">
        <li><a href="#about"
            class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">About</a>
        </li>
        <li><a href="#services"
            class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">Services</a>

        <li><a href="#experience"
            class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">Experience</a>

        <li><a href="#projects"
            class="font-semibold text-sm uppercase tracking-widest hover:text-[#2F81F7] transition-colors">Projects</a>

      </ul>

      <a href="mailto:daviluquini7@gmail.com"
        class="hidden md:inline-flex font-bold text-sm px-5 py-2.5 bg-black text-white border-[3px] border-black shadow-[4px_4px_0_#000] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150">

        <span class="block w-5 h-0.5 bg-black" aria-hidden="true"></span>

    @if (menuOpen()) {
    <div id="mobile-menu" class="md:hidden border-t-[3px] border-black bg-white px-6 py-4 flex flex-col gap-4">
      <a href="#about" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">About</a>
      <a href="#services" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">Services</a>
      <a href="#experience" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">Experience</a>
      <a href="#projects" class="font-semibold uppercase tracking-widest" (click)="toggleMenu()">Projects</a>

        class="font-bold text-sm px-5 py-2.5 bg-black text-white border-[3px] border-black text-center">Let's talk →</a>
