<header role="banner">
  <nav aria-label="Main navigation" class="sticky top-0 z-50 bg-surface border-b-[3px] border-rule">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#" aria-label="Davi Luquini – Home" class="font-black text-2xl tracking-tighter text-ink">DL.</a>

      <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0" role="list">
        <li><a href="#about" class="font-semibold text-sm uppercase tracking-widest text-ink hover:text-[#2F81F7] transition-colors">{{ t().nav.about }}</a></li>
        <li><a href="#services" class="font-semibold text-sm uppercase tracking-widest text-ink hover:text-[#2F81F7] transition-colors">{{ t().nav.services }}</a></li>
        <li><a href="#experience" class="font-semibold text-sm uppercase tracking-widest text-ink hover:text-[#2F81F7] transition-colors">{{ t().nav.experience }}</a></li>
        <li><a href="#projects" class="font-semibold text-sm uppercase tracking-widest text-ink hover:text-[#2F81F7] transition-colors">{{ t().nav.projects }}</a></li>
      </ul>

      <div class="hidden md:flex items-center gap-3">
        <button
          (click)="toggleTheme()"
          class="border-[2px] border-rule text-ink w-8 h-8 flex items-center justify-center hover:bg-ink hover:text-surface transition-colors duration-150"
          [attr.aria-label]="theme() === 'light' ? 'Switch to dark theme' : 'Switch to light theme'"
        >
          @if (theme() === 'light') {
            <svg viewBox="0 0 24 24" class="w-4 h-4" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4" fill="currentColor"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          }
        </button>
        <button
          (click)="toggleLang()"
          class="font-black text-xs tracking-widest border-[2px] border-rule text-ink px-2.5 py-1 hover:bg-ink hover:text-surface transition-colors duration-150"
          [attr.aria-label]="lang() === 'en' ? 'Switch to Portuguese' : 'Switch to English'"
        >{{ lang() === 'en' ? 'PT' : 'EN' }}</button>
        <a href="mailto:daviluquini7@gmail.com"
          class="font-bold text-sm px-5 py-2.5 bg-ink text-surface border-[3px] border-rule shadow-brutal-sm hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all duration-150">
          {{ t().nav.talk }}
        </a>
      </div>

      <button
        class="md:hidden p-2 border-[3px] border-rule shadow-brutal-xs hover:shadow-none hover:translate-x-[3px] hover:translate-y-[3px] transition-all duration-150"
        [attr.aria-expanded]="menuOpen()" aria-controls="mobile-menu" aria-label="Toggle navigation menu"
        (click)="toggleMenu()">
        <span class="block w-5 h-0.5 bg-ink mb-1" aria-hidden="true"></span>
        <span class="block w-5 h-0.5 bg-ink mb-1" aria-hidden="true"></span>
        <span class="block w-5 h-0.5 bg-ink" aria-hidden="true"></span>
      </button>
    </div>

    @if (menuOpen()) {
    <div id="mobile-menu" class="md:hidden border-t-[3px] border-rule bg-surface px-6 py-4 flex flex-col gap-4">
      <a href="#about" class="font-semibold uppercase tracking-widest text-ink" (click)="toggleMenu()">{{ t().nav.about }}</a>
      <a href="#services" class="font-semibold uppercase tracking-widest text-ink" (click)="toggleMenu()">{{ t().nav.services }}</a>
      <a href="#experience" class="font-semibold uppercase tracking-widest text-ink" (click)="toggleMenu()">{{ t().nav.experience }}</a>
      <a href="#projects" class="font-semibold uppercase tracking-widest text-ink" (click)="toggleMenu()">{{ t().nav.projects }}</a>
      <div class="flex gap-3 items-center">
        <button (click)="toggleTheme()" class="border-[2px] border-rule text-ink w-8 h-8 flex items-center justify-center" [attr.aria-label]="theme() === 'light' ? 'Switch to dark theme' : 'Switch to light theme'">
          @if (theme() === 'light') {
            <svg viewBox="0 0 24 24" class="w-4 h-4" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4" fill="currentColor"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          }
        </button>
        <button (click)="toggleLang()" class="font-black text-xs tracking-widest border-[2px] border-rule text-ink px-2.5 py-1">{{ lang() === 'en' ? 'PT' : 'EN' }}</button>
        <a href="mailto:daviluquini7@gmail.com"
          class="font-bold text-sm px-5 py-2.5 bg-ink text-surface border-[3px] border-rule text-center flex-1">{{ t().nav.talk }}</a>
      </div>
    </div>
    }
  </nav>
</header>
